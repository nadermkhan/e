name: Build Elegant Compiler (Windows)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install LLVM (Pre-built Binaries)
      # This downloads pre-compiled LLVM in seconds instead of building it for hours
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "18.1.6" # Matches the version you were trying to use
        env: true         # Automatically sets LLVM_DIR so CMake finds it instantly

    - name: Configure CMake
      # Notice we completely removed the vcpkg toolchain flag.
      # CMake will automatically find the LLVM_DIR exported by the step above.
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build Toolchain
      # This builds your evo parser, generates the header, and compiles elegantc.exe
      run: cmake --build build --config Release

    - name: Prepare Artifact Directory
      run: |
        mkdir ElegantRelease
        copy build\Release\elegantc.exe ElegantRelease\
        
    - name: Upload Compiler Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Elegant-Compiler-Windows-x64
        path: ElegantRelease\*
        compression-level: 9
