name: Build Elegant Compiler (Windows)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install LLVM (Pre-built Binaries)
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "18.1.6"
        env: true

    - name: Verify LLVM Path (Debug)
      run: |
        echo "LLVM is installed at: $env:LLVM_PATH"
        dir "$env:LLVM_PATH\lib\cmake\llvm"

    - name: Configure CMake
      # By setting CMAKE_PREFIX_PATH, find_package(LLVM) will instantly succeed
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:LLVM_PATH"

    - name: Build Toolchain
      run: cmake --build build --config Release

    - name: Prepare Artifact Directory
      run: |
        mkdir ElegantRelease
        copy build\Release\elegantc.exe ElegantRelease\
        
    - name: Upload Compiler Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Elegant-Compiler-Windows-x64
        path: ElegantRelease\*
        compression-level: 9
