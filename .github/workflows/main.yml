name: Build Elegant Compiler (Windows)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Native Windows Environment (MSYS2 UCRT64)
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-toolchain
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-llvm
          mingw-w64-ucrt-x86_64-lld

    - name: Configure CMake
      shell: msys2 {0}
      run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build Toolchain
      shell: msys2 {0}
      run: cmake --build build

    - name: Prepare Standalone Artifact
      shell: msys2 {0}
      run: |
        mkdir ElegantRelease
        mkdir ElegantRelease/lib

        echo "Copying Compiler and Linker..."
        cp build/elegantc.exe ElegantRelease/
        cp /ucrt64/bin/lld-link.exe ElegantRelease/

        echo "Bundling required DLLs for true zero-dependency portability..."
        ldd build/elegantc.exe | grep "ucrt64" | awk '{print $3}' | xargs -I '{}' cp '{}' ElegantRelease/
        ldd /ucrt64/bin/lld-link.exe | grep "ucrt64" | awk '{print $3}' | xargs -I '{}' cp -n '{}' ElegantRelease/

        echo "Bundling MinGW-w64 UCRT64 import libraries for AOT (-c) linking..."
        # lld-link (MSVC flavor) searches /defaultlib: entries by exact
        # filename on its /libpath: list, so we rename the MinGW-style
        # `libfoo.a` import archives to `foo.lib`. The archives are COFF
        # import libs, which lld-link parses natively — no Visual Studio
        # or Windows SDK install required on the user's machine.
        MINGW_LIB=/ucrt64/x86_64-w64-mingw32/lib
        for name in ucrt kernel32 msvcrt user32 advapi32 shell32 ole32 \
                    mingw32 mingwex moldname; do
          src="${MINGW_LIB}/lib${name}.a"
          if [ -f "${src}" ]; then
            cp "${src}" "ElegantRelease/lib/${name}.lib"
          fi
        done
        
    - name: Upload Compiler Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Elegant-Compiler-Windows-x64
        path: ElegantRelease/*
        compression-level: 9