name: Build Elegant Compiler (Windows)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install LLVM (Pre-built Binaries)
      # Pulls the official Microsoft-compatible LLVM 18 binaries instantly.
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "18.1.6"
        env: true

    - name: Configure CMake
      # Bypasses CMake's flaky Windows prefix search by pointing directly
      # to the folder containing LLVMConfig.cmake. Uses GitHub native 
      # variable expansion to avoid PowerShell string-escaping issues.
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="${{ env.LLVM_PATH }}/lib/cmake/llvm"

    - name: Build Toolchain
      # Compiles evo.exe, uses it to generate ElegantParser.hpp, 
      # and then compiles and links elegantc.exe against the LLVM backend.
      run: cmake --build build --config Release

    - name: Prepare Artifact Directory
      run: |
        mkdir ElegantRelease
        copy build\Release\elegantc.exe ElegantRelease\
        
    - name: Upload Compiler Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Elegant-Compiler-Windows-x64
        path: ElegantRelease\*
        compression-level: 9
