name: Build Elegant Compiler (Windows)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Native Windows Environment (MSYS2 UCRT64)
      # This provides a lightning-fast package manager for Windows native binaries.
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-toolchain
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-llvm

    - name: Configure CMake
      # Run inside the MSYS2 shell. find_package(LLVM) works automatically here!
      shell: msys2 {0}
      run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build Toolchain
      shell: msys2 {0}
      run: cmake --build build

    - name: Prepare Standalone Artifact
      shell: msys2 {0}
      run: |
        mkdir ElegantRelease
        cp build/elegantc.exe ElegantRelease/
        
        echo "Bundling required DLLs so the executable is portable..."
        # This brilliantly finds any dynamic libraries (like libLLVM.dll) that your 
        # compiler needs and copies them into the release folder.
        ldd build/elegantc.exe | grep "ucrt64" | awk '{print $3}' | xargs -I '{}' cp '{}' ElegantRelease/
        
    - name: Upload Compiler Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Elegant-Compiler-Windows-x64
        path: ElegantRelease/*
        compression-level: 9
